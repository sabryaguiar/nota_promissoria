<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Notas Promissórias - Império Marques Veículos</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root { --gold:#d89000; --black:#050505; --gray:#777; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Arial, Helvetica, sans-serif; background:#f2f2f2; color:#111; }
    header { background:#000; color:#fff; padding:18px 22px; text-align:center; border-bottom:4px solid var(--gold); }
    header h1 { margin:0; font-size:24px; text-transform:uppercase; letter-spacing:.5px; }
    header p { margin:6px 0 0; opacity:.9; }
    .wrap { display:grid; grid-template-columns: 390px 1fr; gap:18px; padding:18px; align-items:start; }
    .panel { background:#fff; border-radius:12px; padding:16px; box-shadow:0 4px 18px rgba(0,0,0,.12); }
    .panel h2 { margin:0 0 14px; font-size:18px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    label { display:flex; flex-direction:column; gap:5px; font-size:12px; font-weight:700; text-transform:uppercase; }
    input, textarea, select { border:1px solid #bbb; border-radius:8px; padding:10px; font-size:14px; outline:none; background:#fff; }
    input:focus, textarea:focus, select:focus { border-color:var(--gold); box-shadow:0 0 0 2px rgba(216,144,0,.15); }
    .full { grid-column:1 / -1; }
    button { width:100%; border:0; border-radius:10px; padding:13px; font-size:15px; font-weight:800; cursor:pointer; text-transform:uppercase; margin-top:10px; }
    .primary { background:#000; color:#fff; border:2px solid var(--gold); }
    .secondary { background:#fff; color:#000; border:2px solid #000; }
    .hint { font-size:12px; color:#555; margin-top:10px; line-height:1.35; }

    .preview-area { overflow:auto; background:#ddd; border-radius:12px; padding:12px; max-height:calc(100vh - 135px); }
    .a4-page { width:297mm; height:210mm; background:white; margin:0 auto 12px; padding:3mm; box-shadow:0 2px 14px rgba(0,0,0,.25); page-break-after:always; overflow:hidden; }
    .note-row { width:291mm; height:67mm; border:0.35mm solid var(--gold); border-radius:3.2mm; display:grid; grid-template-columns: 41mm 157mm 3mm 90mm; overflow:hidden; margin-bottom:.75mm; background:white; }
    .note-row:last-child { margin-bottom:0; }
    .sidebar { border-right:0.35mm solid var(--gold); display:flex; flex-direction:column; align-items:stretch; }
    .logoBox { background:#000; height:23mm; display:flex; align-items:center; justify-content:center; overflow:hidden; border-bottom:0.18mm solid #222; }
    .logoBox img { max-width:32mm; max-height:22mm; object-fit:contain; }
    .sideFields { padding:2.2mm 2.4mm; font-size:2.35mm; line-height:1.08; }
    .sideLine { display:grid; grid-template-columns:auto 1fr; align-items:end; gap:1.4mm; margin-bottom:1.55mm; font-weight:700; white-space:nowrap; }
    .sideLine .value { border-bottom:.25mm solid #aaa; height:3.5mm; font-weight:600; padding:0 0 0.35mm 1mm; display:flex; align-items:flex-end; line-height:1; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    .sideLine .money { display:grid; grid-template-columns:4.2mm 1fr; gap:.7mm; align-items:end; }
    .sideLine.stack { display:block; margin-bottom:1.55mm; }
    .sideLine.stack .money { margin-top:.65mm; display:grid; grid-template-columns:4.2mm 1fr; gap:.7mm; align-items:end; }
    .due { text-align:center; margin-top:.2mm; font-size:2.65mm; font-weight:700; line-height:1.05; white-space:nowrap; }
    .sideLine.dueLine { display:block; margin-top:.2mm; margin-bottom:0; }
    .sideLine.dueLine .dueValue { display:block; text-align:left; padding-left:0; padding-right:0; margin-top:.85mm; font-size:2.75mm; font-weight:800; white-space:nowrap; }

    .main { padding:2.7mm 4mm 2.1mm; position:relative; overflow:hidden; }
    .title { text-align:center; font-size:6.15mm; line-height:.92; font-weight:900; letter-spacing:.15mm; margin:0 22mm 0 0; text-transform:uppercase; white-space:nowrap; }
    .title .gold { color:#c67a00; }
    .subtitle { width:52mm; margin:1.2mm auto 1.5mm; background:#000; color:#fff; border-radius:1.1mm; text-align:center; font-size:3.15mm; font-weight:900; padding:.6mm 0; text-transform:uppercase; }
    .parcelBox { position:absolute; right:3mm; top:3mm; width:21mm; height:14.6mm; border:.3mm solid var(--gold); border-radius:1.4mm; text-align:center; font-size:2.15mm; font-weight:900; padding-top:1.45mm; line-height:1.08; background:#fff; }
    .parcelBox .parcelNum { display:block; margin-top:.95mm; font-size:5.3mm; font-weight:900; line-height:1; }
    .mainText { font-size:2.65mm; font-weight:700; margin-bottom:.8mm; white-space:nowrap; }
    .mainText .gold { color:#c67a00; }
    .amount { height:5.1mm; border:.25mm solid #777; border-radius:.9mm; display:flex; align-items:center; padding:0 1.6mm; font-size:4.05mm; margin-bottom:.85mm; line-height:1; }
    .fieldRow { display:grid; grid-template-columns:auto 1fr auto 1fr; gap:1.25mm; align-items:end; margin-bottom:1.15mm; font-size:2.62mm; font-weight:700; }
    .fieldRow.two { grid-template-columns:auto 1fr; }
    .fieldRow.vehicle { grid-template-columns:auto 31mm auto 1fr; margin-top:1.1mm; margin-bottom:.8mm; font-size:2.48mm; }
    .line { border-bottom:.22mm solid #888; height:3.35mm; padding:0 .8mm .25mm; font-weight:600; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; display:flex; align-items:flex-end; line-height:1; }
    .signature { position:absolute; bottom:3mm; left:5mm; right:4.5mm; display:grid; grid-template-columns:64mm 1fr; gap:10mm; align-items:end; font-size:2.65mm; font-weight:700; }
    .sigLine { border-top:.25mm solid #777; text-align:center; padding-top:.8mm; min-height:6.8mm; }
    .dateLine { white-space:nowrap; }

    .cut { border-left:.35mm dashed #777; border-right:.35mm dashed #777; position:relative; }
    .cut:before, .cut:after { content:'✂'; position:absolute; left:-2mm; font-size:4mm; color:#111; }
    .cut:before { top:-.8mm; } .cut:after { bottom:-.8mm; }

    .receipt { padding:3.2mm 3mm 2.4mm; position:relative; overflow:hidden; }
    .receiptHead { display:grid; grid-template-columns:20mm 1fr; gap:2.5mm; align-items:start; padding-right:22mm; min-height:20mm; }
    .receiptHead img { width:19mm; max-height:19mm; object-fit:contain; }
    .receiptTitle { font-size:3.35mm; font-weight:900; text-transform:uppercase; line-height:1.05; margin-top:1.2mm; white-space:nowrap; }
    .receiptTitle .gold { color:#c67a00; }
    .receiptSub { margin:2.1mm 0 1.3mm; background:#000; color:#fff; display:inline-block; padding:.75mm 4mm; border-radius:.9mm; font-size:2.75mm; font-weight:900; }
    .receipt .parcelBox { right:3mm; top:8mm; width:22mm; height:14.4mm; font-size:2.05mm; padding-top:1.35mm; }
    .receipt .parcelBox .parcelNum { font-size:5.1mm; font-weight:900; }
    .receiptFields { margin-top:1mm; font-size:2.55mm; font-weight:800; }
    .rrow { display:grid; grid-template-columns:auto 1fr; gap:1.3mm; align-items:end; margin-bottom:1.45mm; }
    .rrow.money { grid-template-columns:auto 6mm 1fr; }
    .importantTitle { margin-top:1.5mm; background:#000; color:#fff; text-align:center; font-weight:900; font-size:2.9mm; padding:.75mm; border-radius:1.1mm 1.1mm 0 0; }
    .important { border-top:0; padding:1.7mm 1.6mm 0; font-size:2.15mm; line-height:1.34; margin:0; }
    .important li { margin-bottom:1.4mm; }

    @media (max-width: 1050px) {
      .wrap { grid-template-columns:1fr; }
      .preview-area { max-height:none; }
    }

    @media (max-width: 768px) {
      body { background:#fff; }
      header { padding:14px 12px; }
      header h1 { font-size:18px; line-height:1.2; }
      header p { font-size:13px; }
      .wrap { display:block; padding:10px; }
      .panel { border-radius:10px; padding:14px; box-shadow:0 2px 10px rgba(0,0,0,.10); }
      .panel h2 { font-size:17px; }
      .grid { grid-template-columns:1fr; gap:12px; }
      .full { grid-column:auto; }
      label { font-size:11px; gap:6px; }
      input, textarea, select { width:100%; min-height:46px; font-size:16px; padding:12px; }
      button { min-height:48px; font-size:14px; padding:12px; }
      .hint { font-size:12px; }
      .preview-area { margin-top:12px; padding:8px; border-radius:10px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
      #pdfRoot { width:max-content; min-width:100%; }
      .a4-page { transform:scale(.31); transform-origin:top left; margin:0 0 -144mm 0; }
    }

    @media (max-width: 420px) {
      .a4-page { transform:scale(.285); margin-bottom:-149mm; }
    }

    @media print { body { background:white; } header, .panel { display:none; } .wrap { display:block; padding:0; } .preview-area { padding:0; overflow:visible; } .a4-page { box-shadow:none; margin:0; transform:none; } }
  </style>
</head>
<body>
  <header>
    <h1>Gerador de Notas Promissórias</h1>
    <p>Império Marques Veículos - A4 paisagem com 3 notas por página</p>
  </header>

  <main class="wrap">
    <section class="panel">
      <h2>Preencha os dados</h2>
      <div class="grid">
        <label>Data da compra <input id="dataCompra" type="date"></label>
        <label>Quantidade de parcelas <input id="qtdParcelas" type="number" min="1" value="3"></label>
        <label>Valor do veículo <input id="valorVeiculo" inputmode="decimal" placeholder="Ex: 12.000,00"></label>
        <label>Entrada <input id="entrada" inputmode="decimal" placeholder="Ex: 2.000,00"></label>
        <label>Parcela <input id="valorParcela" inputmode="decimal" placeholder="Ex: 325,00"></label>
        <label>Vencimento - dia <input id="diaVencimento" type="text" inputmode="numeric" maxlength="2" value="05" placeholder="05"></label>
        <label class="full">Nome do comprador <input id="nome" autocomplete="name" placeholder="Nome completo"></label>
        <label class="full">CPF/CNPJ <input id="cpf" inputmode="numeric" maxlength="18" placeholder="000.000.000-00"></label>
        <label class="full">Endereço <input id="endereco" autocomplete="street-address" placeholder="Rua, número, bairro"></label>
        <label>Cidade/UF <input id="cidadeUf" placeholder="Fortaleza/CE"></label>
        <label>CEP <input id="cep" inputmode="numeric" maxlength="9" placeholder="00000-000"></label>
        <label>Placa veículo vendido <input id="placaVendido" maxlength="8" placeholder="ABC1D23"></label>
        <label>Placa recebida entrada <input id="placaEntrada" maxlength="8" placeholder="Opcional"></label>
        <label class="full">Data da 1ª parcela <input id="dataPrimeiraParcela" type="date"></label>
      </div>
      <button class="secondary" onclick="montarPreview()">Atualizar visualização</button>
      <button class="primary" onclick="gerarPDF()">Baixar PDF A4 paisagem</button>
      <p class="hint">O PDF é criado com 3 notas por página A4 em paisagem. Cada parcela recebe automaticamente o número da parcela e a data mensal.</p>
    </section>

    <section class="preview-area">
      <div id="pdfRoot"></div>
    </section>
  </main>

    function v(id) { return document.getElementById(id).value.trim(); }
    function money(valor) {
      if (!valor) return '';
      const normalizado = valor.replace(/[^0-9,\.]/g, '').replace('.', '').replace(',', '.');
      const n = Number(normalizado);
      if (Number.isNaN(n)) return valor;
      return n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function dataBR(dateStr) {
      if (!dateStr) return '__/__/____';
      const [y,m,d] = dateStr.split('-');
      return `${d}/${m}/${y}`;
    }
    function addMeses(dateStr, meses) {
      if (!dateStr) return '';
      const [y,m,d] = dateStr.split('-').map(Number);
      const dt = new Date(y, m - 1 + meses, d);
      return dt.toISOString().slice(0,10);
    }
    function linha(texto='') { return `<span class="line">${texto || ''}</span>`; }

    function notaHTML(parcela, dataParcela) {
      const total = Number(v('qtdParcelas') || 1);
      const parcelaTxt = `${parcela}/${total}`;
      const valorParcela = money(v('valorParcela'));
      return `
        <div class="note-row">
          <aside class="sidebar">
            <div class="logoBox"><img src="${LOGO_ESQUERDA}" alt="Logo"></div>
            <div class="sideFields">
              <div class="sideLine"><span>DATA DA COMPRA:</span><span class="value">${dataBR(v('dataCompra'))}</span></div>
              <div class="sideLine stack"><span>VALOR DO VEÍCULO:</span><span class="money"><b>R$</b><span class="value">${money(v('valorVeiculo'))}</span></span></div>
              <div class="sideLine"><span>ENTRADA:</span><span class="money"><b>R$</b><span class="value">${money(v('entrada'))}</span></span></div>
              <div class="sideLine"><span>PARCELA:</span><span class="money"><b>R$</b><span class="value">${valorParcela}</span></span></div>
              <div class="sideLine"><span>Nº DE PARCELAS:</span><span class="value">${total}</span></div>
              <div class="sideLine dueLine"><span>VENCIMENTO:</span><span class="dueValue">Dia ${String(v('diaVencimento') || '').padStart(2,'0')} de cada mês</span></div>
            </div>
          </aside>

          <section class="main">
            <div class="parcelBox">Nº DA PARCELA<span class="parcelNum">${parcelaTxt}</span></div>
            <div class="title">IMPÉRIO <span class="gold">MARQUES</span> VEÍCULOS</div>
            <div class="subtitle">NOTA PROMISSÓRIA</div>
            <div class="mainText">Ao(à) <span class="gold">IMPÉRIO MARQUES VEÍCULOS</span>, ou à sua ordem, a quantia de:</div>
            <div class="amount">R$ ${valorParcela}</div>
            <div class="fieldRow two"><span>Nome do Comprador:</span>${linha(v('nome'))}</div>
            <div class="fieldRow two"><span>CPF/CNPJ:</span>${linha(v('cpf'))}</div>
            <div class="fieldRow two"><span>Endereço:</span>${linha(v('endereco'))}</div>
            <div class="fieldRow"><span>Cidade/UF:</span>${linha(v('cidadeUf'))}<span>CEP:</span>${linha(v('cep'))}</div>
            <div class="fieldRow vehicle"><span>PLACA DO VEÍCULO VENDIDO:</span>${linha(v('placaVendido'))}<span>PLACA DO VEÍCULO RECEBIDO (ENTRADA):</span>${linha(v('placaEntrada'))}</div>
            <div class="signature"><div class="sigLine">Assinatura do Devedor</div><div class="dateLine">Data de pagamento da parcela até dia: ${dataBR(dataParcela)}</div></div>
          </section>

          <div class="cut"></div>

          <section class="receipt">
            <div class="parcelBox">Nº DA PARCELA<span class="parcelNum">${parcelaTxt}</span></div>
            <div class="receiptHead">
              <img src="${LOGO_DIREITA}" alt="Logo">
              <div>
                <div class="receiptTitle">IMPÉRIO <span class="gold">MARQUES</span> VEÍCULOS</div>
                <div class="receiptSub">RECIBO DO PAGADOR</div>
              </div>
            </div>
            <div class="receiptFields">
              <div class="rrow"><span>NOME:</span>${linha(v('nome'))}</div>
              <div class="rrow"><span>CPF:</span>${linha(v('cpf'))}</div>
              <div class="rrow"><span>REFERENTE À PARCELA:</span>${linha(parcelaTxt)}</div>
              <div class="rrow money"><span>PARCELA:</span><b>R$</b>${linha(valorParcela)}</div>
              <div class="rrow"><span>DATA DO PAGAMENTO DA PARCELA:</span>${linha(dataBR(dataParcela))}</div>
            </div>
            <div class="importantTitle">IMPORTANTE</div>
            <ul class="important">
              <li>A partir do atraso de <b>2 parcelas</b> ficará para renegociação o veículo, será contabilizado a entrada e o que já foi dado sendo descontado o tempo de uso. OBS: se a entrada for algum veículo não poderá ser devolvido.</li>
              <li>O veículo será contabilizado pelo valor negociado.</li>
            </ul>
          </section>
        </div>`;
    }

    function montarPreview() {
      const root = document.getElementById('pdfRoot');
      const qtd = Math.max(1, Number(v('qtdParcelas') || 1));
      const primeira = v('dataPrimeiraParcela');
      let html = '';
      for (let i = 1; i <= qtd; i += 3) {
        html += '<div class="a4-page">';
        for (let j = 0; j < 3 && i + j <= qtd; j++) {
          html += notaHTML(i + j, addMeses(primeira, i + j - 1));
        }
        html += '</div>';
      }
      root.innerHTML = html;
    }

    async function gerarPDF() {
      montarPreview();
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });
      const pages = document.querySelectorAll('.a4-page');
      for (let i = 0; i < pages.length; i++) {
        const canvas = await html2canvas(pages[i], { scale:2, useCORS:true, backgroundColor:'#ffffff' });
        const imgData = canvas.toDataURL('image/jpeg', 1.0);
        if (i > 0) pdf.addPage('a4', 'landscape');
        pdf.addImage(imgData, 'JPEG', 0, 0, 297, 210);
      }
      pdf.save('notas-promissorias-imperio-marques.pdf');
    }

    function somenteNumeros(valor) {
      return (valor || '').replace(/\D/g, '');
    }

    function formatarMoedaCampo(input) {
      const texto = input.value.trim();
      if (!texto) return;
      let numero;
      if (/[,.]/.test(texto)) {
        const normalizado = texto.replace(/[^0-9,\.]/g, '').replace(/\./g, '').replace(',', '.');
        numero = Number(normalizado);
      } else {
        numero = Number(somenteNumeros(texto));
      }
      if (!Number.isNaN(numero)) {
        input.value = numero.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
    }

    function formatarCpfCnpj(valor) {
      const n = somenteNumeros(valor).slice(0, 14);
      if (n.length <= 11) {
        return n
          .replace(/(\d{3})(\d)/, '$1.$2')
          .replace(/(\d{3})(\d)/, '$1.$2')
          .replace(/(\d{3})(\d{1,2})$/, '$1-$2');
      }
      return n
        .replace(/(\d{2})(\d)/, '$1.$2')
        .replace(/(\d{3})(\d)/, '$1.$2')
        .replace(/(\d{3})(\d)/, '$1/$2')
        .replace(/(\d{4})(\d{1,2})$/, '$1-$2');
    }

    function formatarCep(valor) {
      return somenteNumeros(valor).slice(0, 8).replace(/(\d{5})(\d{1,3})$/, '$1-$2');
    }

    function formatarDia(valor) {
      const n = somenteNumeros(valor).slice(0, 2);
      if (!n) return '';
      const dia = Math.min(Math.max(Number(n), 1), 31);
      return String(dia).padStart(2, '0');
    }

    function formatarPlaca(valor) {
      return (valor || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 7);
    }

    function configurarMascaras() {
      ['valorVeiculo', 'entrada', 'valorParcela'].forEach(id => {
        const campo = document.getElementById(id);
        campo.addEventListener('blur', () => { formatarMoedaCampo(campo); montarPreview(); });
      });

      const cpf = document.getElementById('cpf');
      cpf.addEventListener('input', () => { cpf.value = formatarCpfCnpj(cpf.value); });

      const cep = document.getElementById('cep');
      cep.addEventListener('input', () => { cep.value = formatarCep(cep.value); });

      ['placaVendido', 'placaEntrada'].forEach(id => {
        const campo = document.getElementById(id);
        campo.addEventListener('input', () => { campo.value = formatarPlaca(campo.value); });
      });

      const dia = document.getElementById('diaVencimento');
      dia.addEventListener('blur', () => { dia.value = formatarDia(dia.value || '05'); montarPreview(); });
    }

    configurarMascaras();
    document.addEventListener('input', () => montarPreview());
    montarPreview();
  </script>
</body>
</html>
